server:
  # 端口
  port: 8290

# 连接数据库
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aitourism?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    property-naming-strategy: SNAKE_CASE
  output:
    ansi:
      enabled: ALWAYS
  task:
    scheduling:
      pool:
        size: 1

# Python Agent 服务配置
agent:
  # Python Agent 基础地址（FastAPI 服务，不包含/agent路径）
  base-url: "http://your-agent-host:8291"
  # 可选：内部访问 Token，如未配置则不校验
  internal-token: ""

# OpenAI配置
openai:
  api-key: "your_api_key"
  base-url: "your_base_url"
  model-name: "your_model_name"
  max-output-tokens: 800

# HTTP客户端配置
http:
  client:
    connect-timeout: 30000
    read-timeout: 120000
    max-connections: 100
    keep-alive-duration: 300000

# MyBatis 写数据库
mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.aitourism.entity
  configuration:
    map-underscore-to-camel-case: true


# 日志
logging:
  file:
    name: app.log
    # 或者使用 path
    # path: ./logs
  level:
    com.example.aitourism: INFO
    org.springframework.web: INFO
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%highlight(%-5level)] [%thread] [%X{traceId}] %-5level %logger{36}:%line - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%highlight(%-5level)] [%thread] [%X{traceId}] %-5level %logger{36}:%line - %msg%n"


# Sa-Token & JWT 配置
sa-token:
  token-name: Authorization
  is-read-cookie: false
  is-read-body: false
  is-read-header: true
  token-prefix: Bearer
  timeout: 300   # 10分钟过期，然后前端会refresh刷新
  active-timeout: -1
  is-share: false
  is-log: true
  jwt-secret-key: "please-change-me-very-strong"


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,threaddump,env,logfile
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        step: 10s
        registry-type: classic